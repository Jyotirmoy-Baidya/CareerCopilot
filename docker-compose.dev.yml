name: careercopliot-dev

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       careercopliot
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d careercopliot"]
      interval: 5s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  10

  # ── One-time schema push + seed ────────────────────────────────────────────

  migrate:
    build:
      context:    .
      dockerfile: docker/migrate.Dockerfile
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/careercopliot"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Combined API service on port 4000 ──────────────────────────────────────

  api:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:            "development"
      PORT:                "4000"
      DATABASE_URL:        "postgresql://postgres:postgres@postgres:5432/careercopliot"
      REDIS_URL:           "redis://redis:6379"
      JWT_SECRET:          "${JWT_SECRET:-local-dev-secret-min-32-chars-long}"
      WEB_URL:             "http://localhost:3000"
      OPENROUTER_API_KEY:  "${OPENROUTER_API_KEY:-}"
      GMAIL_USER:          "${GMAIL_USER:-}"
      GMAIL_APP_PASSWORD:  "${GMAIL_APP_PASSWORD:-}"
    command: >
      sh -c "
        npm install &&
        npx turbo run dev --filter=@careercopliot/api
      "
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }

volumes:
  postgres_dev_data:
  redis_dev_data:
  node_modules_dev:
